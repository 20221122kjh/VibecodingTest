<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>timing knight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            background: #87a06f; 
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .controls-guide {
            margin-top: 20px;
            font-size: 10px;
            color: #888;
            text-align: center;
            line-height: 1.6;
        }
        .key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 34px;
            height: 34px;
            padding: 0;
            font-size: 0;
            border: 2px solid #666;
            border-radius: 4px;
            color: #fff;
            margin: 0 2px;
            box-sizing: border-box;
        }
        .key::before {
            content: attr(data-key);
            position: absolute;
            left: 50%;
            top: 50%;
            width: 1em;
            font-size: 18px;
            line-height: 1;
            text-align: center;
            font-family: 'Segoe UI Symbol', 'Noto Sans Symbols 2', sans-serif;
            transform: translate(-50%, -50%);
        }
        .control-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .dodge-keys {
            display: grid;
            grid-template-columns: repeat(2, 34px);
            grid-template-rows: repeat(2, 34px);
            gap: 0;
            justify-items: center;
            align-items: center;
        }
        .dodge-keys .key {
            margin: 0;
        }
        .dodge-keys .up {
            grid-column: 2;
            grid-row: 1;
        }
        .dodge-keys .left {
            grid-column: 1;
            grid-row: 2;
        }
        .dodge-keys .down {
            grid-column: 2;
            grid-row: 2;
        }
        .control-legend {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }
        .control-separator {
            display: inline-block;
            width: 2px;
            height: 62px;
            background: #fff;
            opacity: 0.95;
            margin-bottom: 14px;
        }
        .control-label {
            font-size: 9px;
            color: #cfcfcf;
            margin-left: 0;
            line-height: 1;
        }
        .blink-text {
            animation: blink 1s steps(1, end) infinite;
        }
        #dodgePrompt {
            position: absolute;
            left: 50%;
            top: 28%;
            transform: translate(-50%, -50%);
            padding: 14px 18px;
            border: 3px solid #fff;
            background: rgba(0, 0, 0, 0.78);
            text-align: center;
            line-height: 1.5;
            display: none;
            z-index: 20;
            animation: tutorialPulse 0.35s steps(2, end) infinite;
        }
        #dodgePrompt strong {
            color: #fff;
        }
        #dodgePrompt,
        #attackPrompt {
            font-family: 'Press Start 2P', cursive;
            font-size: 13px;
            color: #fff;
            text-shadow: none;
        }
        .tutorial-keys {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            vertical-align: middle;
        }
        .tutorial-key {
            display: inline-block;
            position: relative;
            width: 26px;
            height: 26px;
            border: 2px solid #fff;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.12);
            box-sizing: border-box;
            font-size: 0;
            text-align: center;
            vertical-align: middle;
        }
        .tutorial-key::before {
            content: attr(data-key);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            line-height: 1;
            font-family: 'Segoe UI Symbol', 'Noto Sans Symbols 2', sans-serif;
            font-weight: 700;
        }
        #attackPrompt {
            position: absolute;
            left: 50%;
            bottom: 8%;
            transform: translateX(-50%);
            text-align: center;
            line-height: 1.4;
            display: none;
            z-index: 20;
        }
        #overlay {
            z-index: 30;
        }
        .lobby-panel {
            width: 100%;
            max-width: 740px;
            padding: 18px 20px;
            color: #071004;
            background: #87a06f;
            border: 4px solid #000;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-sizing: border-box;
        }
        .lobby-screen {
            width: 800px;
            min-height: 400px;
            padding: 18px;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #87a06f;
            display: none;
            box-sizing: border-box;
        }
        .lobby-icons {
            display: flex;
            justify-content: space-between;
            gap: 14px;
        }
        .lobby-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .icon-frame {
            width: 110px;
            height: 110px;
            border: 6px solid #000;
            background: #8ea878;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pixel-icon {
            width: 76px;
            height: 76px;
            image-rendering: pixelated;
        }
        .upgrade-btn {
            width: 100%;
            max-width: 200px;
            border: 3px solid #000;
            background: #d6e1c9;
            color: #000;
            padding: 8px 6px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
            line-height: 1.4;
        }
        .upgrade-btn:active {
            transform: translateY(1px);
        }
        .upgrade-btn:disabled {
            background: #9aa78e;
            color: #33402e;
            border-color: #33402e;
            cursor: not-allowed;
        }
        .lobby-card-stat {
            font-size: 8px;
            color: #0f2107;
            text-align: center;
            line-height: 1.4;
            min-height: 26px;
        }
        .lobby-meta {
            border-top: 3px solid #000;
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
            font-size: 9px;
        }
        .lobby-notice {
            color: #7b1208;
            min-height: 12px;
        }
        .lobby-notice.notice-bounce {
            animation: noticeBounce 0.34s ease-in-out;
        }
        .lobby-card-stat.stat-bounce {
            animation: noticeBounce 0.34s ease-in-out;
        }
        .pause-panel {
            display: none;
            width: min(420px, 92%);
            border: 4px solid #ffffff;
            background: rgba(0, 0, 0, 0.88);
            padding: 18px 14px;
            color: #ffffff;
            text-align: center;
            box-sizing: border-box;
        }
        .pause-title {
            font-size: 16px;
            margin-bottom: 14px;
        }
        .pause-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        .pause-btn {
            width: min(280px, 100%);
            border: 3px solid #ffffff;
            background: #1a2c11;
            color: #ffffff;
            padding: 10px 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
        }
        .pause-btn:active {
            transform: translateY(1px);
        }
        .pause-hint {
            margin-top: 10px;
            font-size: 8px;
            color: #c6c6c6;
        }
        @media (max-width: 760px) {
            .lobby-screen {
                width: 100%;
                min-height: auto;
                padding: 10px;
            }
            .lobby-panel {
                padding: 12px 10px;
            }
            .lobby-icons {
                flex-direction: column;
                align-items: center;
            }
            .lobby-card {
                width: 100%;
                max-width: 260px;
            }
        }
        @keyframes tutorialPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }
        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.2; }
        }
        @keyframes noticeBounce {
            0% { transform: translateY(0); }
            25% { transform: translateY(-3px); }
            50% { transform: translateY(2px); }
            75% { transform: translateY(-2px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="flex flex-col items-center">
        <div id="battleScreen" class="relative">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <div id="dodgePrompt" aria-live="polite">
                <div><strong>회피!</strong> 피격 직전입니다</div>
                <div>
                    <span class="tutorial-keys" aria-hidden="true">
                        <span class="tutorial-key" data-key="↑"></span>
                        <span class="tutorial-key" data-key="←"></span>
                        <span class="tutorial-key" data-key="↓"></span>
                    </span>
                    중 하나를 누르세요
                </div>
            </div>
            <div id="attackPrompt" class="blink-text" aria-live="polite"><span class="tutorial-key" data-key="→" aria-hidden="true"></span>를 눌러 공격하세요!</div>
            <div id="overlay" class="absolute inset-0 bg-black flex flex-col items-center justify-center p-6 text-center">
                <div id="introPanel">
                    <h1 id="main-title" class="text-3xl mb-4">TIMING KNIGHT</h1>
                    <p id="sub-title" class="text-[10px] text-gray-400 mt-6 blink-text">PRESS SPACE TO START</p>
                </div>
                <div id="pausePanel" class="pause-panel" aria-live="polite">
                    <h2 class="pause-title">PAUSED</h2>
                    <div class="pause-actions">
                        <button id="pauseContinueBtn" class="pause-btn" type="button">CONTINUE</button>
                        <button id="pauseLobbyBtn" class="pause-btn" type="button">RETURN TO LOBBY</button>
                    </div>
                    <p class="pause-hint">ESC: CONTINUE</p>
                </div>
            </div>
        </div>
        <div id="lobbyScreen" class="lobby-screen">
            <div id="lobbyPanel" class="lobby-panel" aria-live="polite">
                <div class="lobby-icons">
                    <div class="lobby-card">
                        <div class="icon-frame"><canvas id="iconSword" class="pixel-icon" width="16" height="16"></canvas></div>
                        <button id="upgradeAtkBtn" class="upgrade-btn" type="button">[1] ATK UPGRADE</button>
                        <p id="atkCardStat" class="lobby-card-stat">ATK</p>
                    </div>
                    <div class="lobby-card">
                        <div class="icon-frame"><canvas id="iconHeart" class="pixel-icon" width="16" height="16"></canvas></div>
                        <button id="upgradeHpBtn" class="upgrade-btn" type="button">[2] HP UPGRADE</button>
                        <p id="hpCardStat" class="lobby-card-stat">HP</p>
                    </div>
                    <div class="lobby-card">
                        <div class="icon-frame"><canvas id="iconShield" class="pixel-icon" width="16" height="16"></canvas></div>
                        <button id="upgradeDefBtn" class="upgrade-btn" type="button">[3] DEF UPGRADE</button>
                        <p id="defCardStat" class="lobby-card-stat">DEF</p>
                    </div>
                </div>
                <div class="lobby-meta">
                    <p id="lobbyGoldLine">GOLD: 0</p>
                    <p id="lobbyStatLine">HP 100 | ATK 25 | DEF 0</p>
                    <p id="lobbyNoticeLine" class="lobby-notice"></p>
                    <p>SPACE: START STAGE</p>
                </div>
            </div>
        </div>
        <div class="controls-guide">
            로비: [1][2][3] 업그레이드, [SPACE] 시작 | 전투: [→] 공격, [↑][←][↓] 회피<br>
            목표: 스테이지를 클리어해 골드를 모으고 로비에서 성장하세요.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const battleScreenEl = document.getElementById('battleScreen');
        const lobbyScreenEl = document.getElementById('lobbyScreen');
        const overlay = document.getElementById('overlay');
        const introPanelEl = document.getElementById('introPanel');
        const pausePanelEl = document.getElementById('pausePanel');
        const pauseContinueBtnEl = document.getElementById('pauseContinueBtn');
        const pauseLobbyBtnEl = document.getElementById('pauseLobbyBtn');
        const subTitleEl = document.getElementById('sub-title');
        const lobbyPanelEl = document.getElementById('lobbyPanel');
        const lobbyGoldLineEl = document.getElementById('lobbyGoldLine');
        const lobbyStatLineEl = document.getElementById('lobbyStatLine');
        const lobbyNoticeLineEl = document.getElementById('lobbyNoticeLine');
        const hpCardStatEl = document.getElementById('hpCardStat');
        const atkCardStatEl = document.getElementById('atkCardStat');
        const defCardStatEl = document.getElementById('defCardStat');
        const upgradeHpBtnEl = document.getElementById('upgradeHpBtn');
        const upgradeAtkBtnEl = document.getElementById('upgradeAtkBtn');
        const upgradeDefBtnEl = document.getElementById('upgradeDefBtn');
        const dodgePromptEl = document.getElementById('dodgePrompt');
        const attackPromptEl = document.getElementById('attackPrompt');
        const upgradeAudio = new Audio('sound/buy.mp3');
        upgradeAudio.preload = 'auto';
        upgradeAudio.volume = 0.85;
        const insufficientGoldAudio = new Audio('sound/no_money.mp3');
        insufficientGoldAudio.preload = 'auto';
        insufficientGoldAudio.volume = 0.9;
        const monsterKillAudio = new Audio('sound/Kill_sound.mp3');
        monsterKillAudio.preload = 'auto';
        monsterKillAudio.volume = 0.9;
        let audioCtx = null;
        let lobbyNoticeAnimTimer = null;
        let lobbyStatAnimTimer = null;

        function drawPixelIcon(canvasId, pattern) {
            const iconCanvas = document.getElementById(canvasId);
            const iconCtx = iconCanvas.getContext('2d');
            iconCtx.clearRect(0, 0, 16, 16);
            iconCtx.fillStyle = '#000000';
            for (let y = 0; y < pattern.length; y++) {
                const row = pattern[y];
                for (let x = 0; x < row.length; x++) {
                    if (row[x] === '1') {
                        iconCtx.fillRect(x, y, 1, 1);
                    }
                }
            }
        }

        function renderLobbyIcons() {
            const sword = [
                '0000000000000000',
                '0000000000000010',
                '0000000000000110',
                '0000000000001100',
                '0000000000011000',
                '0000000000110000',
                '0000000001100000',
                '0000000011000000',
                '0000100110000000',
                '0001111110000000',
                '0000111100000000',
                '0000011000000000',
                '0000111100000000',
                '0001100110000000',
                '0011000011000000',
                '0000000000000000'
            ];
            const heart = [
                '0000000000000000',
                '0000110011000000',
                '0001111111100000',
                '0011111111110000',
                '0011111111110000',
                '0001111111100000',
                '0000111111000000',
                '0000011110000000',
                '0000001100000000',
                '0000000000000000',
                '0000000000000000',
                '0000000000000000',
                '0000000000000000',
                '0000000000000000',
                '0000000000000000',
                '0000000000000000',
            ];
            const shield = [
                '0000011111100000',
                '0001111111110000',
                '0011101101111000',
                '0011000000111000',
                '0011100001111000',
                '0011111111111000',
                '0001111111110000',
                '0000111111100000',
                '0000011111000000',
                '0000001110000000',
                '0000001110000000',
                '0000001110000000',
                '0000000000000000',
                '0000000000000000',
                '0000000000000000',
                '0000000000000000'
            ];

            drawPixelIcon('iconSword', sword);
            drawPixelIcon('iconHeart', heart);
            drawPixelIcon('iconShield', shield);
        }

        function getAudioContext() {
            if (!audioCtx) {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return null;
                audioCtx = new AudioCtx();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playHitSfx() {
            const ac = getAudioContext();
            if (!ac) return;

            const now = ac.currentTime;
            const master = ac.createGain();
            master.gain.setValueAtTime(0.18, now);
            master.connect(ac.destination);

            const oscA = ac.createOscillator();
            const gainA = ac.createGain();
            oscA.type = 'square';
            oscA.frequency.setValueAtTime(980, now);
            oscA.frequency.exponentialRampToValueAtTime(220, now + 0.07);
            gainA.gain.setValueAtTime(0.0001, now);
            gainA.gain.exponentialRampToValueAtTime(0.35, now + 0.005);
            gainA.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
            oscA.connect(gainA);
            gainA.connect(master);

            const oscB = ac.createOscillator();
            const gainB = ac.createGain();
            oscB.type = 'square';
            oscB.frequency.setValueAtTime(680, now);
            oscB.frequency.exponentialRampToValueAtTime(160, now + 0.05);
            gainB.gain.setValueAtTime(0.0001, now);
            gainB.gain.exponentialRampToValueAtTime(0.22, now + 0.003);
            gainB.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
            oscB.connect(gainB);
            gainB.connect(master);

            oscA.start(now);
            oscB.start(now);
            oscA.stop(now + 0.09);
            oscB.stop(now + 0.07);
        }

        function playUpgradeSfxFallback() {
            const ac = getAudioContext();
            if (!ac) return;

            const now = ac.currentTime;
            const master = ac.createGain();
            master.gain.setValueAtTime(0.16, now);
            master.connect(ac.destination);

            const blipA = ac.createOscillator();
            const blipAGain = ac.createGain();
            blipA.type = 'square';
            blipA.frequency.setValueAtTime(920, now);
            blipA.frequency.exponentialRampToValueAtTime(1320, now + 0.05);
            blipAGain.gain.setValueAtTime(0.0001, now);
            blipAGain.gain.exponentialRampToValueAtTime(0.23, now + 0.01);
            blipAGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            blipA.connect(blipAGain);
            blipAGain.connect(master);

            const blipB = ac.createOscillator();
            const blipBGain = ac.createGain();
            blipB.type = 'triangle';
            blipB.frequency.setValueAtTime(680, now + 0.04);
            blipB.frequency.exponentialRampToValueAtTime(980, now + 0.11);
            blipBGain.gain.setValueAtTime(0.0001, now + 0.04);
            blipBGain.gain.exponentialRampToValueAtTime(0.18, now + 0.07);
            blipBGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
            blipB.connect(blipBGain);
            blipBGain.connect(master);

            const click = ac.createOscillator();
            const clickGain = ac.createGain();
            click.type = 'square';
            click.frequency.setValueAtTime(1800, now + 0.015);
            click.frequency.exponentialRampToValueAtTime(240, now + 0.04);
            clickGain.gain.setValueAtTime(0.0001, now + 0.015);
            clickGain.gain.exponentialRampToValueAtTime(0.14, now + 0.02);
            clickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
            click.connect(clickGain);
            clickGain.connect(master);

            blipA.start(now);
            blipB.start(now + 0.04);
            click.start(now + 0.015);

            blipA.stop(now + 0.12);
            blipB.stop(now + 0.17);
            click.stop(now + 0.055);
        }

        function playUpgradeSfx() {
            try {
                upgradeAudio.currentTime = 0;
                const playPromise = upgradeAudio.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => playUpgradeSfxFallback());
                }
            } catch (err) {
                playUpgradeSfxFallback();
            }
        }

        function playInsufficientGoldSfx() {
            try {
                insufficientGoldAudio.currentTime = 0;
                const playPromise = insufficientGoldAudio.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => {});
                }
            } catch (err) {
                // No fallback needed for this notification sound.
            }
        }

        function playMonsterKillSfx() {
            try {
                monsterKillAudio.currentTime = 0;
                const playPromise = monsterKillAudio.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => {});
                }
            } catch (err) {
                // No fallback needed for this notification sound.
            }
        }

        function setSubTitle(text, isBlinking = false) {
            subTitleEl.innerText = text;
            subTitleEl.classList.toggle('blink-text', isBlinking);
        }

        const PALETTE = {
            DARK: '#1a2c11',
            MID: '#466223',
            LIGHT: '#87a06f',
            ACCENT: '#9eb27a',
            BLACK: '#0a1206',
            DANGER: '#e74c3c',
            COOLDOWN: '#333',
            HIT_GOLD: '#fbc531',
            HIT_WHITE: '#ffffff'
        };

        const GAME_CONFIG = {
            TOTAL_STAGES: 5,
            MONSTERS_PER_STAGE: 5
        };

        const UPGRADE_CONFIG = {
            hp: { baseCost: 40, costGrowth: 30, amount: 20, maxLevel: 10, label: '체력' },
            atk: { baseCost: 50, costGrowth: 35, amount: 5, maxLevel: 10, label: '공격력' },
            def: { baseCost: 45, costGrowth: 30, amount: 2, maxLevel: 10, label: '방어력' }
        };

        function isBossStage(stage = state.stage) {
            return stage % GAME_CONFIG.MONSTERS_PER_STAGE === 0;
        }

        function isFinalBossStage(stage = state.stage) {
            return stage === GAME_CONFIG.TOTAL_STAGES;
        }

        function getEnemyProfile(stage = state.stage) {
            const baseHp = 80 + (stage * 40);
            const baseDamage = 20;
            const baseIdleTimer = Math.max(120, 300 - (stage * 3));
            const basePreparingTimer = 45;
            const baseHoldTimer = 55;
            const baseAttackTimer = 25;

            let profile = {
                hp: baseHp,
                damage: baseDamage,
                idleTimer: baseIdleTimer,
                preparingTimer: basePreparingTimer,
                holdTimer: baseHoldTimer,
                attackTimer: baseAttackTimer
            };

            if (isBossStage(stage)) {
                profile = {
                    hp: Math.floor(profile.hp * 1.45),
                    damage: profile.damage + 8,
                    idleTimer: Math.max(90, profile.idleTimer - 35),
                    preparingTimer: basePreparingTimer,
                    holdTimer: baseHoldTimer,
                    attackTimer: baseAttackTimer
                };
            }

            if (isFinalBossStage(stage)) {
                profile = {
                    hp: Math.floor(profile.hp * 1.8),
                    damage: profile.damage + 12,
                    idleTimer: Math.max(70, profile.idleTimer - 20),
                    preparingTimer: basePreparingTimer,
                    holdTimer: baseHoldTimer,
                    attackTimer: baseAttackTimer
                };
            }

            return profile;
        }

        const state = {
            mode: 'LOBBY', 
            stage: 1,
            gold: 0,
            shake: 0,
            timeScale: 1,
            cameraZoom: 1,
            cameraTargetZoom: 1,
            cameraFocusX: canvas.width / 2,
            cameraFocusY: canvas.height / 2,
            cameraTargetFocusX: canvas.width / 2,
            cameraTargetFocusY: canvas.height / 2,
            nextStageTimer: 0,
            particles: [],
            afterimages: [],
            attackMarkers: [],
            messageText: '',
            messageTimer: 0,
            messageColor: '#ffffff',
            lobbyNotice: '',
            tutorial: {
                hasPlayedOnce: false,
                hasTriggeredFirstAttackCue: false,
                isCinematicActive: false,
                phase: 'OFF',
                slowFrames: 0,
                hasCompletedFirstDodge: false,
                attackHintShown: false,
                attackedSinceTutorialEnd: false,
                attackHintFrames: 0
            }
        };

        const player = {
            originX: 120,
            originY: 300,
            x: 120, y: 300,
            hp: 100, maxHp: 100,
            def: 0,
            atk: 25, 
            hpLevel: 0,
            atkLevel: 0,
            defLevel: 0,
            status: 'IDLE',
            timer: 0,
            maxAttackTimer: 40,
            maxDodgeTimer: 40,
            dodgeCooldown: 0, 
            maxDodgeCooldown: 60, 
            isDodging: false
        };

        const enemy = {
            originX: 680,
            originY: 300,
            x: 680, y: 300,
            hp: 100, maxHp: 100,
            attackPower: 20,
            status: 'IDLE',
            attackDir: 'MID', 
            waveOffset: 0,
            waveCycles: 0,
            orbitCycles: 0,
            timer: 0,
            maxPreparingTimer: 45, 
            preparingDuration: 45,
            maxHoldTimer: 55,      
            idleTimer: 300, 
            idleResetTimer: 300,
            maxAttackTimer: 25,    
            hasDealtDamage: false,
            prepX: 680,
            prepY: 300,
            hitFlash: 0
        };

        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            getAudioContext();
            const key = e.key;

            if (key === 'Escape' || e.code === 'Escape') {
                if (state.mode === 'PLAY') {
                    openPauseMenu();
                    return;
                }
                if (state.mode === 'PAUSED') {
                    resumeFromPause();
                    return;
                }
            }

            // Temporary debug shortcut for balance testing.
            if (key === 'p' || key === 'P') {
                state.gold += 10000;
                showMessage('+10000 GOLD (TEST)', PALETTE.HIT_GOLD, 90);
                if (state.mode === 'LOBBY') updateLobbyOverlay();
                return;
            }

            if (state.mode === 'LOBBY') {
                if (key === 'o' || key === 'O' || e.code === 'KeyO') {
                    startGame(5);
                    return;
                }
                if (key === '1' || key === 'Numpad1') {
                    tryUpgrade('atk');
                    return;
                }
                if (key === '2' || key === 'Numpad2') {
                    tryUpgrade('hp');
                    return;
                }
                if (key === '3' || key === 'Numpad3') {
                    tryUpgrade('def');
                    return;
                }
                if (key === ' ' || key === 'Spacebar' || e.code === 'Space') startGame();
                return;
            }
            if (state.mode === 'GAMEOVER' || state.mode === 'CLEAR') {
                if (key === ' ' || key === 'Spacebar' || e.code === 'Space') enterLobby();
                return;
            }
            if (state.mode === 'PAUSED') {
                return;
            }
            if (state.mode === 'PLAY') {
                if (player.status !== 'IDLE') return;

                const isArrowInput = ['ArrowRight', 'ArrowLeft', 'ArrowUp', 'ArrowDown'].includes(key);
                const isStage1BeforeTutorialFreeze = (
                    state.stage === 1 &&
                    (!state.tutorial.hasTriggeredFirstAttackCue ||
                     (state.tutorial.isCinematicActive && state.tutorial.phase !== 'FROZEN'))
                );
                if (isStage1BeforeTutorialFreeze && isArrowInput) {
                    return;
                }

                if (state.stage === 1 && !state.tutorial.hasCompletedFirstDodge && key === 'ArrowRight') {
                    return;
                }

                if (state.tutorial.isCinematicActive && key === 'ArrowRight') {
                    return;
                }

                const isStage1PreHitLock = (
                    state.stage === 1 &&
                    enemy.status === 'ATTACKING' &&
                    ((enemy.maxAttackTimer - enemy.timer) / enemy.maxAttackTimer) >= 0.25
                );
                if (isStage1PreHitLock && key === 'ArrowRight') {
                    return;
                }

                if (key === 'ArrowRight') {
                    if (state.stage === 1 && state.tutorial.hasCompletedFirstDodge) {
                        state.tutorial.attackedSinceTutorialEnd = true;
                        state.tutorial.attackHintShown = true;
                        state.tutorial.attackHintFrames = 0;
                        attackPromptEl.style.display = 'none';
                    }
                    player.status = 'ATTACK';
                    player.timer = player.maxAttackTimer;
                    setTimeout(() => checkHit(), 100); 
                } else if (['ArrowLeft', 'ArrowUp', 'ArrowDown'].includes(key)) {
                    if (player.dodgeCooldown > 0) return;
                    if (key === 'ArrowLeft') player.status = 'DODGE_BACK';
                    else if (key === 'ArrowUp') player.status = 'DODGE_UP';
                    else if (key === 'ArrowDown') player.status = 'DODGE_DOWN';
                    player.timer = player.maxDodgeTimer;
                    player.isDodging = true;
                    player.dodgeCooldown = player.maxDodgeCooldown;
                    if (state.tutorial.isCinematicActive) releaseDodgeTutorialCue();
                }
            }
        });

        function startGame(startStage = 1) {
            const targetStage = Math.max(1, Math.min(GAME_CONFIG.TOTAL_STAGES, startStage));
            const showTutorialThisRun = targetStage === 1 && !state.tutorial.hasPlayedOnce;
            state.tutorial.hasPlayedOnce = true;

            state.mode = 'PLAY';
            state.stage = targetStage;
            state.timeScale = 1;
            state.cameraZoom = 1;
            state.cameraTargetZoom = 1;
            state.cameraFocusX = canvas.width / 2;
            state.cameraFocusY = canvas.height / 2;
            state.cameraTargetFocusX = canvas.width / 2;
            state.cameraTargetFocusY = canvas.height / 2;
            state.particles = [];
            state.afterimages = [];
            state.attackMarkers = [];
            state.messageText = '';
            state.messageTimer = 0;
            state.messageColor = '#ffffff';
            state.lobbyNotice = '';
            state.tutorial.hasTriggeredFirstAttackCue = !showTutorialThisRun;
            state.tutorial.isCinematicActive = false;
            state.tutorial.phase = 'OFF';
            state.tutorial.slowFrames = 0;
            state.tutorial.hasCompletedFirstDodge = !showTutorialThisRun;
            state.tutorial.attackHintShown = !showTutorialThisRun;
            state.tutorial.attackedSinceTutorialEnd = false;
            state.tutorial.attackHintFrames = 0;
            dodgePromptEl.style.display = 'none';
            attackPromptEl.style.display = 'none';
            player.hp = player.maxHp;
            player.dodgeCooldown = 0;
            player.x = player.originX;
            player.y = player.originY;
            resetEnemy();
            enemy.idleTimer = 1;
            document.getElementById('main-title').innerText = "TIMING KNIGHT";
            setSubTitle("PRESS SPACE TO START", true);
            battleScreenEl.style.display = 'block';
            lobbyScreenEl.style.display = 'none';
            pausePanelEl.style.display = 'none';
            introPanelEl.style.display = 'none';
            overlay.style.display = 'none';
            requestAnimationFrame(gameLoop);
        }

        function updateLobbyOverlay() {
            const hpCost = player.hpLevel >= UPGRADE_CONFIG.hp.maxLevel ? 'MAX' : `${getUpgradeCost('hp')}G`;
            const atkCost = player.atkLevel >= UPGRADE_CONFIG.atk.maxLevel ? 'MAX' : `${getUpgradeCost('atk')}G`;
            const defCost = player.defLevel >= UPGRADE_CONFIG.def.maxLevel ? 'MAX' : `${getUpgradeCost('def')}G`;

            lobbyGoldLineEl.innerText = `GOLD: ${state.gold}`;
            lobbyStatLineEl.innerText = `HP ${player.maxHp} | ATK ${player.atk} | DEF ${player.def}`;
            lobbyNoticeLineEl.innerText = state.lobbyNotice;

            hpCardStatEl.innerText = `HP LV ${player.hpLevel} | +${UPGRADE_CONFIG.hp.amount} | ${hpCost}`;
            atkCardStatEl.innerText = `ATK LV ${player.atkLevel} | +${UPGRADE_CONFIG.atk.amount} | ${atkCost}`;
            defCardStatEl.innerText = `DEF LV ${player.defLevel} | +${UPGRADE_CONFIG.def.amount} | ${defCost}`;

            upgradeHpBtnEl.disabled = player.hpLevel >= UPGRADE_CONFIG.hp.maxLevel;
            upgradeAtkBtnEl.disabled = player.atkLevel >= UPGRADE_CONFIG.atk.maxLevel;
            upgradeDefBtnEl.disabled = player.defLevel >= UPGRADE_CONFIG.def.maxLevel;
        }

        function enterLobby() {
            state.mode = 'LOBBY';
            attackPromptEl.style.display = 'none';
            dodgePromptEl.style.display = 'none';
            state.timeScale = 1;
            state.cameraTargetZoom = 1;
            state.cameraTargetFocusX = canvas.width / 2;
            state.cameraTargetFocusY = canvas.height / 2;
            battleScreenEl.style.display = 'none';
            lobbyScreenEl.style.display = 'block';
            pausePanelEl.style.display = 'none';
            introPanelEl.style.display = 'none';
            overlay.style.display = 'none';
            updateLobbyOverlay();
        }

        function openPauseMenu() {
            if (state.mode !== 'PLAY') return;
            state.mode = 'PAUSED';
            battleScreenEl.style.display = 'block';
            lobbyScreenEl.style.display = 'none';
            introPanelEl.style.display = 'none';
            pausePanelEl.style.display = 'block';
            overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.58)';
            overlay.style.display = 'flex';
        }

        function resumeFromPause() {
            if (state.mode !== 'PAUSED') return;
            state.mode = 'PLAY';
            pausePanelEl.style.display = 'none';
            overlay.style.display = 'none';
            requestAnimationFrame(gameLoop);
        }

        function returnToLobbyFromPause() {
            if (state.mode !== 'PAUSED') return;
            pausePanelEl.style.display = 'none';
            overlay.style.display = 'none';
            enterLobby();
        }

        function resetEnemy() {
            const profile = getEnemyProfile(state.stage);
            enemy.maxHp = profile.hp;
            enemy.hp = enemy.maxHp;
            enemy.attackPower = profile.damage;
            enemy.status = 'IDLE';
            enemy.timer = 0;
            enemy.maxPreparingTimer = profile.preparingTimer;
            enemy.preparingDuration = enemy.maxPreparingTimer;
            enemy.maxHoldTimer = profile.holdTimer;
            enemy.maxAttackTimer = profile.attackTimer;
            enemy.idleResetTimer = profile.idleTimer;
            enemy.idleTimer = enemy.idleResetTimer;
            enemy.x = enemy.originX;
            enemy.y = enemy.originY;
            enemy.waveOffset = 0;
            enemy.waveCycles = 0;
            enemy.orbitCycles = 0;
            enemy.hasDealtDamage = false;
            enemy.hitFlash = 0;
            state.nextStageTimer = 0;

            if (state.stage !== 1) {
                state.tutorial.hasTriggeredFirstAttackCue = true;
                state.tutorial.isCinematicActive = false;
                state.tutorial.phase = 'OFF';
                state.tutorial.slowFrames = 0;
                state.tutorial.hasCompletedFirstDodge = true;
                state.tutorial.attackHintShown = true;
                state.tutorial.attackedSinceTutorialEnd = false;
                state.tutorial.attackHintFrames = 0;
                state.timeScale = 1;
                state.cameraTargetZoom = 1;
                state.cameraTargetFocusX = canvas.width / 2;
                state.cameraTargetFocusY = canvas.height / 2;
                dodgePromptEl.style.display = 'none';
                attackPromptEl.style.display = 'none';
            }
        }

        function triggerDodgeTutorialCue() {
            state.tutorial.hasTriggeredFirstAttackCue = true;
            state.tutorial.isCinematicActive = true;
            state.tutorial.phase = 'SLOW';
            state.tutorial.slowFrames = 8;
            state.timeScale = 0.03;
            state.cameraTargetZoom = 1;
            state.cameraTargetFocusX = canvas.width / 2;
            state.cameraTargetFocusY = canvas.height / 2;
            dodgePromptEl.style.display = 'block';
        }

        function releaseDodgeTutorialCue() {
            state.tutorial.isCinematicActive = false;
            state.tutorial.phase = 'OFF';
            state.tutorial.slowFrames = 0;
            state.tutorial.hasCompletedFirstDodge = true;
            state.tutorial.attackHintShown = false;
            state.tutorial.attackedSinceTutorialEnd = false;
            state.tutorial.attackHintFrames = 0;
            state.timeScale = 1;
            state.cameraTargetZoom = 1;
            state.cameraTargetFocusX = canvas.width / 2;
            state.cameraTargetFocusY = canvas.height / 2;
            dodgePromptEl.style.display = 'none';

            // After tutorial dodge input, move quickly into the actual strike so the dodge feels meaningful.
            if (state.stage === 1) {
                if (enemy.status === 'PREPARING') {
                    enemy.status = 'HOLD';
                    enemy.x = enemy.prepX;
                    enemy.y = enemy.prepY;
                    enemy.timer = 8;
                } else if (enemy.status === 'HOLD') {
                    enemy.timer = Math.min(enemy.timer, 8);
                }
            }
        }

        function createHitEffect(x, y) {
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 5;
                state.particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,
                    size: Math.random() * 6 + 4,
                    color: PALETTE.HIT_GOLD,
                    gravity: 0.2
                });
            }
            state.particles.push({
                x, y, vx: 0, vy: 0, life: 1.0, size: 40, color: 'rgba(255,255,255,0.8)', isRing: true
            });
        }

        function createBurst(x, y, color) {
            for (let i = 0; i < 15; i++) {
                state.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1.0,
                    size: Math.random() * 5 + 3,
                    color,
                    gravity: 0.1
                });
            }
        }

        function getUpgradeCost(type) {
            const cfg = UPGRADE_CONFIG[type];
            const level = player[`${type}Level`];
            return cfg.baseCost + (level * cfg.costGrowth);
        }

        function showMessage(text, color = '#ffffff', duration = 80) {
            state.messageText = text;
            state.messageColor = color;
            state.messageTimer = duration;
        }

        function emphasizeInsufficientGoldNotice() {
            if (!lobbyNoticeLineEl) return;
            lobbyNoticeLineEl.classList.remove('notice-bounce');
            void lobbyNoticeLineEl.offsetWidth;
            lobbyNoticeLineEl.classList.add('notice-bounce');
            if (lobbyNoticeAnimTimer) clearTimeout(lobbyNoticeAnimTimer);
            lobbyNoticeAnimTimer = setTimeout(() => {
                lobbyNoticeLineEl.classList.remove('notice-bounce');
            }, 380);
        }

        function emphasizeUpgradedStat(type) {
            let targetEl = null;
            if (type === 'hp') targetEl = hpCardStatEl;
            else if (type === 'atk') targetEl = atkCardStatEl;
            else if (type === 'def') targetEl = defCardStatEl;
            if (!targetEl) return;

            targetEl.classList.remove('stat-bounce');
            void targetEl.offsetWidth;
            targetEl.classList.add('stat-bounce');
            if (lobbyStatAnimTimer) clearTimeout(lobbyStatAnimTimer);
            lobbyStatAnimTimer = setTimeout(() => {
                targetEl.classList.remove('stat-bounce');
            }, 380);
        }

        function tryUpgrade(type) {
            const cfg = UPGRADE_CONFIG[type];
            const levelKey = `${type}Level`;
            if (player[levelKey] >= cfg.maxLevel) {
                state.lobbyNotice = `${cfg.label} 업그레이드 최대`;
                showMessage(`${cfg.label} 업그레이드 최대`, '#f1c40f', 70);
                if (state.mode === 'LOBBY') updateLobbyOverlay();
                return;
            }

            const cost = getUpgradeCost(type);
            if (state.gold < cost) {
                state.lobbyNotice = `골드 부족 (${cost}G 필요)`;
                showMessage(`골드 부족 (${cost}G 필요)`, '#e74c3c', 70);
                playInsufficientGoldSfx();
                if (state.mode === 'LOBBY') {
                    updateLobbyOverlay();
                    emphasizeInsufficientGoldNotice();
                }
                return;
            }

            state.gold -= cost;
            player[levelKey] += 1;
            playUpgradeSfx();

            if (type === 'hp') {
                player.maxHp += cfg.amount;
                player.hp = Math.min(player.maxHp, player.hp + cfg.amount);
            } else if (type === 'atk') {
                player.atk += cfg.amount;
            } else if (type === 'def') {
                player.def += cfg.amount;
            }

            state.lobbyNotice = '';
            if (state.mode === 'LOBBY') {
                updateLobbyOverlay();
                emphasizeUpgradedStat(type);
            }
        }

        function addAfterimage(x, y, status) {
            state.afterimages.push({ x, y, status, life: 0.8 });
        }

        function checkHit() {
            if (enemy.hp <= 0) return;
            playHitSfx();
            enemy.hp -= player.atk;
            state.shake = 15;
            enemy.hitFlash = 10;
            createHitEffect(enemy.x - 10, enemy.y - 45);
            if (enemy.hp <= 0) {
                enemy.hp = 0;
                playMonsterKillSfx();
                const reward = 30 + (state.stage * 20);
                state.gold += reward;
                showMessage(`+${reward} GOLD`, PALETTE.HIT_GOLD, 90);
                state.nextStageTimer = 60; 
            }
        }

        function gameLoop() {
            if (state.mode !== 'PLAY') return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (state.tutorial.isCinematicActive && state.tutorial.phase === 'SLOW') {
                state.tutorial.slowFrames--;
                if (state.tutorial.slowFrames <= 0) {
                    state.tutorial.phase = 'FROZEN';
                    state.timeScale = 0;
                }
            }

            const dt = state.timeScale;
            if (player.dodgeCooldown > 0) player.dodgeCooldown = Math.max(0, player.dodgeCooldown - dt);
            if (enemy.hitFlash > 0) enemy.hitFlash = Math.max(0, enemy.hitFlash - dt);
            if (state.messageTimer > 0) state.messageTimer = Math.max(0, state.messageTimer - dt);

            if (
                state.stage === 1 &&
                state.tutorial.hasCompletedFirstDodge &&
                !state.tutorial.attackedSinceTutorialEnd &&
                !state.tutorial.attackHintShown
            ) {
                state.tutorial.attackHintFrames++;
                if (state.tutorial.attackHintFrames >= 300) {
                    state.tutorial.attackHintShown = true;
                    attackPromptEl.style.display = 'block';
                }
            }

            const zoomLerp = state.tutorial.isCinematicActive ? 0.42 : 0.12;
            const focusLerp = state.tutorial.isCinematicActive ? 0.3 : 0.1;
            state.cameraZoom += (state.cameraTargetZoom - state.cameraZoom) * zoomLerp;
            state.cameraFocusX += (state.cameraTargetFocusX - state.cameraFocusX) * focusLerp;
            state.cameraFocusY += (state.cameraTargetFocusY - state.cameraFocusY) * focusLerp;

            const halfViewW = canvas.width / (2 * state.cameraZoom);
            const halfViewH = canvas.height / (2 * state.cameraZoom);
            state.cameraFocusX = Math.max(halfViewW, Math.min(canvas.width - halfViewW, state.cameraFocusX));
            state.cameraFocusY = Math.max(halfViewH, Math.min(canvas.height - halfViewH, state.cameraFocusY));

            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                if (p.isRing) {
                    p.size += 15 * dt;
                    p.life -= 0.1 * dt;
                } else {
                    p.x += p.vx * dt; 
                    p.y += p.vy * dt; 
                    if (p.gravity) p.vy += p.gravity * dt;
                    p.life -= 0.03 * dt;
                }
                if (p.life <= 0) state.particles.splice(i, 1);
            }

            for (let i = state.afterimages.length - 1; i >= 0; i--) {
                const img = state.afterimages[i];
                img.life -= 0.08 * dt;
                if (img.life <= 0) state.afterimages.splice(i, 1);
            }

            for (let i = state.attackMarkers.length - 1; i >= 0; i--) {
                const marker = state.attackMarkers[i];
                marker.alpha -= 0.02 * dt;
                if (marker.alpha <= 0) state.attackMarkers.splice(i, 1);
            }

            if (state.nextStageTimer > 0) {
                state.nextStageTimer -= dt;
                if (state.nextStageTimer <= 0) {
                    if (state.stage >= GAME_CONFIG.TOTAL_STAGES) {
                        gameClear();
                    } else {
                        state.stage++;
                        resetEnemy();
                    }
                }
            }

            if (player.timer > 0) {
                player.timer -= dt;
                if (player.status.startsWith('DODGE') && player.timer % 4 === 0) {
                    addAfterimage(player.x, player.y, player.status);
                }

                if (player.status === 'ATTACK') {
                    const progress = (player.maxAttackTimer - player.timer) / player.maxAttackTimer;
                    const dashDist = enemy.originX - player.originX - 60;
                    player.x = player.originX + Math.sin(progress * Math.PI) * dashDist;
                } else if (player.status === 'DODGE_BACK') {
                    player.x = player.originX - 100;
                } else if (player.status === 'DODGE_UP') {
                    player.y = player.originY - 80;
                } else if (player.status === 'DODGE_DOWN') {
                    player.y = player.originY + 80;
                }

                if (player.timer <= 0) {
                    player.status = 'IDLE';
                    player.isDodging = false;
                    player.x = player.originX;
                    player.y = player.originY;
                }
            }

            if (enemy.hp > 0) {
                if (enemy.status === 'IDLE') {
                    if (state.nextStageTimer === 0) {
                        enemy.idleTimer -= dt;
                        if (enemy.idleTimer <= 0) {
                            enemy.status = 'PREPARING';
                            enemy.hasDealtDamage = false;
                            
                            let patterns = [];
                            if (state.stage === 1) {
                                patterns = ['MID'];
                            } else if (state.stage === 2) {
                                patterns = ['MID', 'MID_WAVE'];
                            } else if (state.stage === 3) {
                                patterns = ['AIR_STRAIGHT', 'GROUND_STRAIGHT'];
                            } else if (state.stage === 4) {
                                patterns = ['AIR_DIVE', 'GROUND_UPPER', 'LONG', 'AIR_ORBIT_SWEEP'];
                            } else if (state.stage === 5) {
                                patterns = ['MID_WAVE', 'AIR_STRAIGHT', 'AIR_DIVE', 'GROUND_STRAIGHT', 'GROUND_UPPER', 'LONG', 'AIR_ORBIT_SWEEP'];
                            }
                            enemy.attackDir = patterns[Math.floor(Math.random() * patterns.length)];

                            if (enemy.attackDir === 'MID_WAVE') {
                                const waveOffsets = [0, -80, 80];
                                enemy.waveOffset = waveOffsets[Math.floor(Math.random() * waveOffsets.length)];
                                enemy.waveCycles = Math.random() < 0.5 ? 2 : 3;
                                enemy.orbitCycles = 0;
                                enemy.preparingDuration = Math.floor(enemy.maxPreparingTimer * 2.2);
                            } else if (enemy.attackDir === 'AIR_ORBIT_SWEEP') {
                                enemy.waveOffset = 0;
                                enemy.waveCycles = 0;
                                enemy.orbitCycles = Math.random() < 0.5 ? 2 : 3;
                                enemy.preparingDuration = Math.floor(enemy.maxPreparingTimer * 2.0);
                            } else {
                                enemy.waveOffset = 0;
                                enemy.waveCycles = 0;
                                enemy.orbitCycles = 0;
                                enemy.preparingDuration = enemy.maxPreparingTimer;
                            }

                            enemy.timer = enemy.preparingDuration;

                            if (enemy.attackDir === 'AIR_ORBIT_SWEEP') {
                                enemy.prepX = enemy.originX + 70;
                                enemy.prepY = enemy.originY - 30;
                            } else if (enemy.attackDir.startsWith('AIR')) {
                                enemy.prepX = enemy.originX + 70;
                                enemy.prepY = enemy.originY - 120;
                            } else if (enemy.attackDir.startsWith('GROUND')) {
                                enemy.prepX = enemy.originX + 70;
                                enemy.prepY = enemy.originY + 60;
                            } else if (enemy.attackDir === 'MID_WAVE') {
                                enemy.prepX = enemy.originX;
                                enemy.prepY = enemy.originY;
                            } else if (enemy.attackDir === 'LONG') {
                                enemy.prepX = enemy.originX + 70;
                                enemy.prepY = enemy.originY;
                            } else {
                                enemy.prepX = enemy.originX + 70;
                                enemy.prepY = enemy.originY;
                            }
                        }
                    }
                } else if (enemy.status === 'PREPARING') {
                    enemy.timer -= dt;
                    const progress = (enemy.preparingDuration - enemy.timer) / enemy.preparingDuration;
                    if (enemy.attackDir === 'MID_WAVE') {
                        enemy.x = enemy.originX;
                        const wave = Math.sin(progress * Math.PI * 2 * enemy.waveCycles) * 34;
                        enemy.y = enemy.originY + wave;
                    } else if (enemy.attackDir === 'AIR_ORBIT_SWEEP') {
                        const baseX = enemy.originX + (enemy.prepX - enemy.originX) * progress;
                        const baseY = enemy.originY + (enemy.prepY - enemy.originY) * progress;
                        const orbitAngle = progress * Math.PI * 2 * enemy.orbitCycles;
                        enemy.x = baseX + Math.cos(orbitAngle) * 30;
                        enemy.y = baseY + Math.sin(orbitAngle) * 22;
                    } else {
                        enemy.x = enemy.originX + (enemy.prepX - enemy.originX) * progress;
                        enemy.y = enemy.originY + (enemy.prepY - enemy.originY) * progress;
                    }

                    if (enemy.timer <= 0) {
                        enemy.status = 'HOLD'; 
                        enemy.timer = enemy.maxHoldTimer;
                    }
                } else if (enemy.status === 'HOLD') {
                    enemy.timer -= dt;
                    enemy.x = enemy.prepX;
                    enemy.y = enemy.prepY;

                    if (
                        state.stage === 1 &&
                        !state.tutorial.hasTriggeredFirstAttackCue &&
                        enemy.timer <= 3 &&
                        enemy.timer > 0
                    ) {
                        triggerDodgeTutorialCue();
                    }

                    if (enemy.timer <= 0) {
                        enemy.status = 'ATTACKING';
                        enemy.timer = enemy.maxAttackTimer;
                        
                        if (enemy.attackDir === 'LONG') {
                             state.attackMarkers.push({ x: player.originX, y: player.originY, alpha: 1.0 });
                             state.attackMarkers.push({ x: player.originX - 100, y: player.originY, alpha: 1.0 });
                        } else if (enemy.attackDir === 'MID_WAVE') {
                            state.attackMarkers.push({ x: player.originX, y: player.originY, alpha: 1.0 });
                            state.attackMarkers.push({ x: player.originX, y: player.originY - 80, alpha: 1.0 });
                            state.attackMarkers.push({ x: player.originX, y: player.originY + 80, alpha: 1.0 });
                        } else if (enemy.attackDir === 'AIR_ORBIT_SWEEP') {
                            state.attackMarkers.push({ x: player.originX, y: player.originY, alpha: 1.0 });
                            state.attackMarkers.push({ x: player.originX, y: player.originY - 80, alpha: 1.0 });
                            state.attackMarkers.push({ x: player.originX, y: player.originY + 80, alpha: 1.0 });
                        } else if (enemy.attackDir === 'AIR_STRAIGHT' || enemy.attackDir === 'GROUND_UPPER') {
                            state.attackMarkers.push({ x: player.originX, y: player.originY, alpha: 1.0 });
                            state.attackMarkers.push({ x: player.originX, y: player.originY - 80, alpha: 1.0 });
                            state.attackMarkers.push({ x: player.originX - 100, y: player.originY, alpha: 1.0 });
                        } else if (enemy.attackDir === 'AIR_DIVE' || enemy.attackDir === 'GROUND_STRAIGHT') {
                            state.attackMarkers.push({ x: player.originX, y: player.originY, alpha: 1.0 });
                            state.attackMarkers.push({ x: player.originX, y: player.originY + 80, alpha: 1.0 });
                            state.attackMarkers.push({ x: player.originX - 100, y: player.originY, alpha: 1.0 });
                        } else {
                            state.attackMarkers.push({ x: player.originX, y: player.originY, alpha: 1.0 });
                        }
                    }
                } else if (enemy.status === 'ATTACKING') {
                    enemy.timer -= dt;
                    const progress = (enemy.maxAttackTimer - enemy.timer) / enemy.maxAttackTimer;
                    const startX = enemy.prepX;
                    const startY = enemy.prepY;
                    let didTriggerTutorialThisFrame = false;
                    
                    let targetX = player.originX - 40;
                    let targetY = player.originY;

                    if (
                        enemy.attackDir === 'LONG' ||
                        enemy.attackDir === 'AIR_STRAIGHT' ||
                        enemy.attackDir === 'AIR_DIVE' ||
                        enemy.attackDir === 'GROUND_STRAIGHT' ||
                        enemy.attackDir === 'GROUND_UPPER'
                    ) targetX = player.originX - 140;

                    if (enemy.attackDir === 'AIR_STRAIGHT') targetY = player.originY - 80;
                    else if (enemy.attackDir === 'AIR_DIVE') targetY = player.originY + 40;
                    else if (enemy.attackDir === 'GROUND_STRAIGHT') targetY = player.originY + 80;
                    else if (enemy.attackDir === 'GROUND_UPPER') targetY = player.originY - 40;
                    else if (enemy.attackDir === 'MID_WAVE') targetY = player.originY;

                    const movement = Math.sin(progress * Math.PI);
                    enemy.x = startX - movement * (startX - targetX);
                    enemy.y = startY - movement * (startY - targetY);

                    if (
                        !didTriggerTutorialThisFrame &&
                        !state.tutorial.isCinematicActive &&
                        !enemy.hasDealtDamage &&
                        progress > 0.4 &&
                        progress < 0.6
                    ) {
                        let dodged = false;
                        
                        // 공통: 뒤로 회피(DODGE_BACK)는 좌측까지 커버하는 공격에는 통하지 않음
                        const blocksBackDodge = (
                            enemy.attackDir === 'LONG' ||
                            enemy.attackDir === 'AIR_STRAIGHT' ||
                            enemy.attackDir === 'AIR_DIVE' ||
                            enemy.attackDir === 'GROUND_STRAIGHT' ||
                            enemy.attackDir === 'GROUND_UPPER'
                        );
                        if (player.status === 'DODGE_BACK' && !blocksBackDodge) {
                            dodged = true;
                        } else {
                            // 방향별 특수 회피 판정
                            if (enemy.attackDir === 'LONG') {
                                if (player.status === 'DODGE_UP' || player.status === 'DODGE_DOWN') dodged = true;
                            } else if (enemy.attackDir === 'AIR_STRAIGHT' || enemy.attackDir === 'GROUND_UPPER') {
                                if (player.status === 'DODGE_DOWN') dodged = true;
                            } else if (enemy.attackDir === 'AIR_DIVE' || enemy.attackDir === 'GROUND_STRAIGHT') {
                                if (player.status === 'DODGE_UP') dodged = true;
                            } else if (enemy.attackDir === 'MID') {
                                if (player.status === 'DODGE_UP' || player.status === 'DODGE_DOWN') dodged = true;
                            }
                        }

                        if (!dodged) {
                            const incomingDamage = Math.max(1, enemy.attackPower - player.def);
                            player.hp -= incomingDamage;
                            state.shake = 20;
                            player.status = 'HIT';
                            player.timer = 15;
                            enemy.hasDealtDamage = true;
                            createBurst(player.x + 20, player.y - 45, '#e74c3c');
                            if (player.hp <= 0) gameOver();
                        } else {
                            enemy.hasDealtDamage = true; 
                        }
                    }

                    if (enemy.timer <= 0) {
                        enemy.status = 'IDLE';
                        enemy.x = enemy.originX;
                        enemy.y = enemy.originY;
                        enemy.idleTimer = enemy.idleResetTimer;
                    }
                }
            }
            if (state.shake > 0) state.shake *= 0.85;
        }

        function gameOver() {
            state.mode = 'GAMEOVER';
            attackPromptEl.style.display = 'none';
            battleScreenEl.style.display = 'block';
            lobbyScreenEl.style.display = 'none';
            pausePanelEl.style.display = 'none';
            introPanelEl.style.display = 'block';
            overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.92)';
            overlay.style.display = 'flex';
            document.getElementById('main-title').innerText = "GAME OVER";
            setSubTitle(`STAGE ${state.stage} FAILED. PRESS SPACE FOR LOBBY`);
        }

        function gameClear() {
            state.mode = 'CLEAR';
            attackPromptEl.style.display = 'none';
            battleScreenEl.style.display = 'block';
            lobbyScreenEl.style.display = 'none';
            pausePanelEl.style.display = 'none';
            introPanelEl.style.display = 'block';
            overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.92)';
            overlay.style.display = 'flex';
            document.getElementById('main-title').innerText = "STAGE CLEAR!";
            setSubTitle(`ALL ${GAME_CONFIG.TOTAL_STAGES} STAGES CLEARED | PRESS SPACE FOR LOBBY`);
        }

        function drawPixelSprite(ctx, x, y, size, status, customAlpha = 1.0) {
            ctx.globalAlpha = customAlpha;
            const isCooldown = player.dodgeCooldown > 0 && player.status === 'IDLE';
            const bodySize = size * 0.78;
            const ox = x - bodySize / 2;
            const oy = y - bodySize;
            if (status === 'HIT') ctx.fillStyle = '#ffffff';
            else if (isCooldown) ctx.fillStyle = '#2c3e50';
            else ctx.fillStyle = '#2d7ff9';
            ctx.fillRect(ox, oy, bodySize, bodySize);
            ctx.strokeStyle = '#d6e8ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(ox, oy, bodySize, bodySize);
            ctx.globalAlpha = 1.0;
        }

        function drawAttackX(x, y, alpha = 1.0) {
            const size = 60; 
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.strokeStyle = PALETTE.DANGER;
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x - size/2, y - size); ctx.lineTo(x + size/2, y - size + size);
            ctx.moveTo(x + size/2, y - size); ctx.lineTo(x - size/2, y - size + size);
            ctx.stroke();
            ctx.restore();
        }

        function drawArrow(x, y, dir, timer, isHold) {
            ctx.save();
            ctx.translate(x, y);
            if (isHold || (timer < 20 && Math.floor(Date.now() / 80) % 2 === 0)) {
                ctx.strokeStyle = 'white'; ctx.fillStyle = 'white';
            } else {
                ctx.strokeStyle = PALETTE.DANGER; ctx.fillStyle = PALETTE.DANGER;
            }
            ctx.lineWidth = 6;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            
            let angle = 0;
            if (dir === 'AIR_DIVE') angle = Math.PI * 0.75; 
            else if (dir === 'GROUND_UPPER') angle = -Math.PI * 0.75; 
            else angle = Math.PI; 

            ctx.rotate(angle);
            
            if (dir === 'LONG') {
                for (let yOffset of [-20, 20]) {
                    ctx.save();
                    ctx.translate(0, yOffset);
                    ctx.beginPath();
                    ctx.moveTo(-20, 0); ctx.lineTo(20, 0);
                    ctx.moveTo(5, -15); ctx.lineTo(20, 0); ctx.lineTo(5, 15);
                    ctx.stroke();
                    ctx.restore();
                }
            } else {
                ctx.beginPath();
                ctx.moveTo(-20, 0); ctx.lineTo(20, 0);
                ctx.moveTo(5, -15); ctx.lineTo(20, 0); ctx.lineTo(5, 15);
                ctx.stroke();
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(state.cameraZoom, state.cameraZoom);
            ctx.translate(-state.cameraFocusX, -state.cameraFocusY);
            if (state.shake > 0.5) ctx.translate(Math.random() * state.shake - state.shake/2, Math.random() * state.shake - state.shake/2);
            ctx.fillStyle = PALETTE.DARK; ctx.fillRect(0, 300, canvas.width, 100);
            ctx.fillStyle = PALETTE.DARK; ctx.font = '10px "Press Start 2P"'; ctx.fillText(`STAGE ${state.stage}/${GAME_CONFIG.TOTAL_STAGES}`, 20, 30);
            ctx.fillText(`GOLD ${state.gold}`, 20, 95);
            drawBar(20, 50, 180, 12, player.hp / player.maxHp, '#2ecc71', 'HERO HP');
            if (player.dodgeCooldown > 0) drawBar(20, 70, 60, 6, 1 - (player.dodgeCooldown / player.maxDodgeCooldown), '#9b59b6', 'DODGE');
            const enemyHpLabel = (state.stage % GAME_CONFIG.MONSTERS_PER_STAGE === 0) ? 'BOSS HP' : 'MONSTER HP';
            if (enemy.hp > 0 || state.nextStageTimer > 0) drawBar(canvas.width - 200, 30, 180, 12, enemy.hp / enemy.maxHp, '#e74c3c', enemyHpLabel);
            state.afterimages.forEach(img => drawPixelSprite(ctx, img.x, img.y, 80, img.status, img.life * 0.4));
            drawPixelSprite(ctx, player.x, player.y, 80, player.status);
            if (enemy.hp > 0) drawEnemy();
            state.particles.forEach(p => {
                ctx.globalAlpha = p.life;
                if (p.isRing) {
                    ctx.strokeStyle = p.color; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(p.x, p.y - 45, p.size, 0, Math.PI * 2); ctx.stroke();
                } else {
                    ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                }
            });
            ctx.globalAlpha = 1.0;
            state.attackMarkers.forEach(marker => drawAttackX(marker.x, marker.y, marker.alpha));

            if (state.messageTimer > 0) {
                ctx.fillStyle = state.messageColor;
                ctx.font = '10px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText(state.messageText, canvas.width / 2, 36);
                ctx.textAlign = 'start';
            }

            ctx.restore();
        }

        function drawEnemy() {
            let ex = enemy.x; let ey = enemy.y;
            if (enemy.status === 'HOLD') {
                let arrowX = ex - 80; let arrowY = ey - 45;
                if (enemy.attackDir === 'MID_WAVE' || enemy.attackDir === 'AIR_ORBIT_SWEEP') {
                    drawArrow(arrowX, arrowY - 80, enemy.attackDir, enemy.timer, true);
                    drawArrow(arrowX, arrowY, enemy.attackDir, enemy.timer, true);
                    drawArrow(arrowX, arrowY + 80, enemy.attackDir, enemy.timer, true);
                } else {
                    drawArrow(arrowX, arrowY, enemy.attackDir, enemy.timer, true);
                }
            }
            if (enemy.hitFlash > 0 || (enemy.status === 'HOLD' && Math.floor(Date.now() / 50) % 2 === 0)) ctx.fillStyle = 'white';
            else ctx.fillStyle = '#c0392b';
            const enemySize = 80;
            ctx.fillRect(ex - enemySize / 2, ey - enemySize, enemySize, enemySize);
        }

        function drawBar(x, y, w, h, ratio, color, label) {
            ctx.fillStyle = PALETTE.DARK; ctx.fillRect(x, y, w, h);
            ctx.fillStyle = color; ctx.fillRect(x, y, w * Math.max(0, ratio), h);
            ctx.strokeStyle = 'white'; ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = PALETTE.DARK; ctx.font = '7px "Press Start 2P"'; ctx.fillText(label, x, y - 5);
        }

        upgradeHpBtnEl.addEventListener('click', () => {
            if (state.mode !== 'LOBBY') return;
            tryUpgrade('hp');
        });
        upgradeAtkBtnEl.addEventListener('click', () => {
            if (state.mode !== 'LOBBY') return;
            tryUpgrade('atk');
        });
        upgradeDefBtnEl.addEventListener('click', () => {
            if (state.mode !== 'LOBBY') return;
            tryUpgrade('def');
        });
        pauseContinueBtnEl.addEventListener('click', () => {
            resumeFromPause();
        });
        pauseLobbyBtnEl.addEventListener('click', () => {
            returnToLobbyFromPause();
        });

        window.onload = () => {
            renderLobbyIcons();
            enterLobby();
        };
    </script>
</body>
