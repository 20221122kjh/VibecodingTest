<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Slime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="flex flex-col items-center">
        <div id="battleScreen" class="relative">
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <div id="dodgePrompt" aria-live="polite">
                <div><strong>DODGE!</strong> Incoming hit!</div>
                <div>
                    <span class="tutorial-keys" aria-hidden="true">
                        <span class="tutorial-key" data-key="UP"></span>
                        <span class="tutorial-key" data-key="LEFT"></span>
                        <span class="tutorial-key" data-key="DOWN"></span>
                    </span>
                    Press one of these keys
                </div>
            </div>
            <div id="attackPrompt" class="blink-text" aria-live="polite"><span class="tutorial-key" data-key="RIGHT" aria-hidden="true"></span> Press to attack!</div>
            <div id="overlay" class="absolute inset-0 bg-black flex flex-col items-center justify-center p-6 text-center">
                <div id="introPanel">
                    <h1 id="main-title" class="text-3xl mb-4">TIMING SLIME</h1>
                    <p id="sub-title" class="text-[10px] text-gray-400 mt-6 blink-text">PRESS SPACE TO START</p>
                </div>
                <div id="pausePanel" class="pause-panel" aria-live="polite">
                    <div id="pauseSelectionFrame" class="selection-frame"></div>
                    <h2 class="pause-title">PAUSED</h2>
                    <div class="pause-actions">
                        <button id="pauseContinueBtn" class="pause-btn" type="button">CONTINUE</button>
                        <button id="pauseLobbyBtn" class="pause-btn" type="button">RETURN TO LOBBY</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="lobbyScreen" class="lobby-screen">
            <div id="lobbyPanel" class="lobby-panel" aria-live="polite">
                <div id="lobbySelectionFrame" class="selection-frame"></div>
                <div class="lobby-icons">
                    <div class="lobby-card">
                        <h3 class="lobby-card-title">ATK</h3>
                        <div class="icon-frame"><img id="iconSword" class="pixel-icon" src="image/sword.png" alt="sword"></div>
                        <p id="atkCardStat" class="lobby-card-stat">ATK</p>
                        <button id="upgradeAtkBtn" class="upgrade-btn" type="button">ATK UPGRADE</button>
                    </div>
                    <div class="lobby-card">
                        <h3 class="lobby-card-title">HP</h3>
                        <div class="icon-frame"><img id="iconHeart" class="pixel-icon" src="image/heart.png" alt="heart"></div>
                        <p id="hpCardStat" class="lobby-card-stat">HP</p>
                        <button id="upgradeHpBtn" class="upgrade-btn" type="button">HP UPGRADE</button>
                    </div>
                    <div class="lobby-card">
                        <h3 class="lobby-card-title">DEF</h3>
                        <div class="icon-frame"><img id="iconShield" class="pixel-icon" src="image/shield.png" alt="shield"></div>
                        <p id="defCardStat" class="lobby-card-stat">DEF</p>
                        <button id="upgradeDefBtn" class="upgrade-btn" type="button">DEF UPGRADE</button>
                    </div>
                </div>
                <div class="lobby-meta">
                    <p id="lobbyGoldLine">GOLD: 0</p>
                    <p id="lobbyStatLine">HP 100 | ATK 25 | DEF 0</p>
                    <p id="lobbyNoticeLine" class="lobby-notice"></p>
                    <p id="lobbyStart" class="lobby-start">START STAGE</p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
